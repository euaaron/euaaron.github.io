name: GH Pages Deploy

on:
  pull_request:
    branches: [ main ]

jobs:
   
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2.1.4
      - uses: actions/cache@v2
        with:
          key: ${{runner.os}}-modules-${{hashFiles('**/yarn.lock')}}
          path: "**/node_modules"
      - uses: actions/cache@v2
        with:
          key: ${{runner.os}}-modules-${{hashFiles('**/.dist')}}
          path: "**/.dist"
      - name: Deploy
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "${{ secrets.EMAIL }}"
          git config --global user.name "${{ secrets.USERNAME }}"
          git remote set-url origin https://${{ secrets.GH_TOKEN }}:x-oauth-basic@github.com/${{ secrets.REPO }}.git
          yarn ng add angular-cli-ghpages
          yarn ng deploy --no-build --cname=${{ secrets.PAGE_URL }}
        
      
